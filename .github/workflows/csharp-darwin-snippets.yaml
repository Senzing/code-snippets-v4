name: csharp darwin snippets

on:
  pull_request:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  sdk-versions:
    runs-on: ubuntu-latest
    outputs:
      senzingsdk-versions: ${{ steps.cfg.outputs.senzingsdk-versions }}
    steps:
      - id: cfg
        uses: senzing-factory/build-resources/sdk-versions@v4

  csharp-darwin-snippets:
    needs: sdk-versions
    permissions:
      contents: read
      pull-requests: write
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        senzingsdk-version: ${{ fromJSON(needs.sdk-versions.outputs.senzingsdk-versions) }}
        include:
          - dotnet-version: "8"

    steps:
      - name: checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Mint staging tap token
        if: matrix.senzingsdk-version != 'production-v4'
        id: staging-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.SENZINGSDK_STAGING_CLIENT_ID }}
          private-key: ${{ secrets.SENZINGSDK_STAGING_APP_KEY }}
          owner: senzing-factory # zizmor: ignore[github-app]
          repositories: homebrew-senzingsdk-staging
          permission-contents: read

      - name: install Senzing SDK
        uses: senzing-factory/github-action-install-senzing-sdk@v5
        with:
          senzingsdk-version: ${{ matrix.senzingsdk-version }}
          senzingsdk-token: ${{ steps.staging-token.outputs.token || github.token }}

      - name: configure environment
        run: |
          SENZING_PATH="${HOME}/senzing"
          {
            echo "DYLD_LIBRARY_PATH=${SENZING_PATH}/er/lib:${DYLD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"

      - name: configure local nuget repo
        run: |
          sdk_package=$(find "${HOME}"/senzing/er/sdk/dotnet/ -name "Senzing.Sdk*" | xargs -0 -L 1 basename)
          mkdir -p ~/dev/nuget/packages
          dotnet nuget add source ~/dev/nuget/packages -n dev
          dotnet nuget push "${HOME}"/senzing/er/sdk/dotnet/"${sdk_package}" --source dev

      - name: run csharp snippets
        run: |
          cd "${GITHUB_WORKSPACE}"/csharp/runner
          dotnet add SnippetRunner package Senzing.Sdk --version 4.0.0-beta
          dotnet run --project SnippetRunner all
      - name: Notify Slack on failure
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          additional-info: "SDK: ${{ matrix.senzingsdk-version }}"
